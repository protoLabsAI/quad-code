name: 'Release'

# Fires when a version bump commit lands on main (pushed by prepare-release.yml).
# Builds the bundle, publishes @protolabsai/proto to npm, tags, and creates a GitHub Release.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'protoLabsAI/protoCLI' &&
      (github.event_name == 'workflow_dispatch' ||
       startsWith(github.event.head_commit.message, 'chore: release v'))
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${VERSION}"

          if git tag -l "v${VERSION}" | grep -q "v${VERSION}"; then
            echo "already_tagged=true" >> $GITHUB_OUTPUT
            echo "WARNING: v${VERSION} is already tagged — skipping."
          else
            echo "already_tagged=false" >> $GITHUB_OUTPUT
          fi

      - name: Build bundle
        if: steps.version.outputs.already_tagged != 'true'
        run: npm run bundle

      - name: Prepare package
        if: steps.version.outputs.already_tagged != 'true'
        run: npm run prepare:package

      - name: Publish to npm
        if: steps.version.outputs.already_tagged != 'true'
        working-directory: dist
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure git
        if: steps.version.outputs.already_tagged != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tag
        if: steps.version.outputs.already_tagged != 'true'
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.version.outputs.already_tagged != 'true'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"

          RAW_NOTES=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$VERSION" --jq '.body')

          # Filter out chore PRs unless they're all there is
          ALL_LINES=$(echo "$RAW_NOTES" | grep '^\* ' || true)
          NON_CHORE=$(echo "$ALL_LINES" | grep -vi '^\* chore' || true)

          if [ -n "$NON_CHORE" ]; then
            NOTES=$(echo "$RAW_NOTES" | grep -vi '^\* chore')
          else
            NOTES="$RAW_NOTES"
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Alert on already-tagged
        if: steps.version.outputs.already_tagged == 'true'
        run: |
          echo "::warning::${{ steps.version.outputs.tag }} is already tagged. Run prepare-release.yml first to bump the version."
          exit 1
