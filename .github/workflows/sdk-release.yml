name: 'SDK Release'

# Publishes @proto/sdk to npm whenever a tag matching sdk-v* is pushed.
# To cut an SDK release:
#   npm version patch --workspace packages/sdk-typescript --no-git-tag-version
#   git add packages/sdk-typescript/package.json
#   git commit -m "chore(sdk): release vX.Y.Z"
#   git tag sdk-vX.Y.Z && git push origin sdk-vX.Y.Z

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip npm publish)'
        type: boolean
        default: false

permissions: read-all

jobs:
  sdk-release:
    runs-on: ubuntu-latest
    if: github.repository == 'protoLabsAI/protoCLI'
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Get SDK version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/sdk-typescript/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=sdk-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "SDK version: $VERSION"

      - name: Build SDK
        working-directory: packages/sdk-typescript
        run: npm run build && npm run bundle:cli

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: packages/sdk-typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish
        if: ${{ inputs.dry_run }}
        working-directory: packages/sdk-typescript
        run: npm publish --access public --dry-run

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "@proto/sdk ${{ steps.version.outputs.tag }}" \
            --notes "## @proto/sdk ${{ steps.version.outputs.version }}

          \`\`\`bash
          npm install @proto/sdk
          \`\`\`

          See [CHANGELOG](packages/sdk-typescript/CHANGELOG.md) for details." \
            --latest=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
