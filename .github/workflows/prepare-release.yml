name: 'Prepare Release'

# Bumps version on dev via a PR with auto-merge. When the PR merges,
# the dev→main promotion PR can be opened and release.yml will fire on merge.
#
# Fires automatically when any non-release PR merges to dev (patch bump).
# Can also be triggered manually via Actions → Prepare Release to choose bump type.

on:
  pull_request:
    types: [closed]
    branches:
      - dev
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry_run:
        description: 'Dry run — show what would change without pushing'
        type: boolean
        default: false

permissions: read-all

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'protoLabsAI/protoCLI' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.merged == true &&
          !startsWith(github.event.pull_request.title, 'chore: release')
        )
      )
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: node scripts/version.js ${{ inputs.bump || 'patch' }}

      - name: Get new version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Show diff (dry run)
        if: inputs.dry_run == true
        run: |
          echo "DRY RUN — would commit:"
          git diff --stat
          echo ""
          echo "New version: v${{ steps.version.outputs.version }}"

      - name: Create release PR
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="prepare-release/v${VERSION}"
          TRIGGER="${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch (auto)' }}"

          git checkout -b "${BRANCH}"
          git add package.json package-lock.json packages/*/package.json
          git commit -m "chore: release v${VERSION}"
          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --base dev \
            --head "${BRANCH}" \
            --title "chore: release v${VERSION}" \
            --body "Version bump to v${VERSION} (${TRIGGER})." \
          )
          echo "Created PR: ${PR_URL}"

          gh pr merge "${PR_URL}" --squash --admin
          echo "Merged ${PR_URL}"
